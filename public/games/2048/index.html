<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2048</title><style>*{box-sizing:border-box;margin:0;padding:0}body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#faf8ef;font-family:Arial,sans-serif}#game{position:relative;width:400px;height:400px;background:#bbada0;border-radius:8px;padding:8px}#game div{position:absolute;width:88px;height:88px;border-radius:6px;font-size:36px;font-weight:bold;display:flex;align-items:center;justify-content:center;transition:all .12s ease-in-out}.c0{background:#cdc1b4}.c2{background:#eee4da;color:#776e65}.c4{background:#ede0c8;color:#776e65}.c8{background:#f2b179;color:#f9f6f2}.c16{background:#f59563;color:#f9f6f2}.c32{background:#f67c5f;color:#f9f6f2}.c64{background:#f65e3b;color:#f9f6f2}.c128{background:#edcf72;color:#f9f6f2;font-size:32px}.c256{background:#edcc61;color:#f9f6f2;font-size:32px}.c512{background:#edc850;color:#f9f6f2;font-size:32px}.c1024{background:#edc53f;color:#f9f6f2;font-size:28px}.c2048{background:#edc22e;color:#f9f6f2;font-size:28px}#score{text-align:center;margin-top:12px;font-size:20px;color:#776e65}</style></head><body><div style="text-align:center"><div id="score">Score: 0</div><div id="game"></div><p style="margin-top:12px;color:#776e65;font-size:14px">方向键移动 | R 重新开始</p></div><script>var G=document.getElementById("game"),S=document.getElementById("score"),b=[],s=0;function init(){b=Array(16).fill(0);s=0;add();add();render()}function add(){var e=[];for(var i=0;i<16;i++)if(!b[i])e.push(i);if(e.length){var p=e[Math.floor(Math.random()*e.length)];b[p]=Math.random()<0.9?2:4}}function render(){G.innerHTML="";S.textContent="Score: "+s;for(var i=0;i<16;i++){var v=b[i];if(v){var x=(i%4)*96+8,y=Math.floor(i/4)*96+8,d=document.createElement("div");d.className="c"+v;d.textContent=v;d.style.left=x+"px";d.style.top=y+"px";G.appendChild(d)}}}function slide(r){var m=!1;if(r===0||r===1){for(var c=0;c<4;c++){var a=[];for(var i=0;i<4;i++)a.push(b[r===0?c*4+i:i*4+c]);var n=[],p=0;for(i=0;i<4;i++){if(!a[i])continue;if(n.length>0&&n[n.length-1].v===a[i]&&!n[n.length-1].m){n[n.length-1].v*=2;s+=n[n.length-1].v;n[n.length-1].m=!0}else n.push({v:a[i],m:!1})}while(n.length<4)n.push({v:0,m:!1});for(i=0;i<4;i++){var idx=r===0?c*4+i:i*4+c;if(b[idx]!==n[i].v)m=!0;b[idx]=n[i].v}}}if(m){add();render();if(b.some(function(v){return v===2048}))alert("You Win!")}}document.addEventListener("keydown",function(e){if(e.key==="ArrowUp"){e.preventDefault();slide(0)}else if(e.key==="ArrowDown"){e.preventDefault();slide(1)}else if(e.key==="ArrowLeft"){e.preventDefault();slide(2)}else if(e.key==="ArrowRight"){e.preventDefault();slide(3)}else if(e.key==="r")init()});init();</script></body></html>
